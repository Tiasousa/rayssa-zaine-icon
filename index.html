<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Rayssa Zaine Massoterapia</title>

  <meta name="theme-color" content="#0B0F12">
  <meta name="application-name" content="Rayssa Zaine Massoterapia">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RZ Massoterapia">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icone.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icone.png">

  <style>
    :root{
      --bg:#0B0F12; --acento:#B7823A; --acento2:#CBA571; --text:#F2F0EC; --muted:#9AA7B0;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,system-ui,Arial,sans-serif}

    #app{
      position:fixed;inset:0;width:100%;height:100%;border:0;opacity:0;visibility:hidden;
      background:var(--bg);transition:opacity .65s ease;
    }
    #app.visivel{opacity:1;visibility:visible}

    #splash{
      position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;overflow:hidden;
      padding:calc(20px + env(safe-area-inset-top,0px)) 18px calc(20px + env(safe-area-inset-bottom,0px));
      background:
        radial-gradient(circle at 50% 28%,rgba(183,130,58,.20),transparent 30%),
        radial-gradient(circle at 50% 78%,rgba(183,130,58,.08),transparent 36%),
        linear-gradient(155deg,#0B0F12 0%,#141B20 55%,#0B0F12 100%);
      color:var(--text);transition:opacity .75s ease,visibility .75s ease;
    }
    #splash.saindo{opacity:0;visibility:hidden;pointer-events:none}

    .conteudo{width:min(92vw,420px);display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;z-index:2;animation:entrada .9s cubic-bezier(.2,.8,.2,1) both}

    .universo{position:relative;width:210px;height:210px;margin-bottom:22px;display:grid;place-items:center}
    .halo{position:absolute;width:210px;height:210px;border-radius:50%;background:radial-gradient(circle,rgba(183,130,58,.30),rgba(183,130,58,.06) 46%,transparent 72%);filter:blur(18px);animation:pulsar 2.8s ease-in-out infinite}
    .anel{position:absolute;border-radius:50%;border:1.5px solid rgba(183,130,58,.35)}
    .anel.a{width:180px;height:180px;animation:girar 7s linear infinite}
    .anel.b{width:200px;height:200px;border-color:rgba(203,165,113,.22);animation:girar 11s linear infinite reverse}

    .marca{position:relative;width:132px;height:132px;border-radius:30px;background:linear-gradient(180deg,#12181c,#0d1215);
      display:flex;align-items:center;justify-content:center;box-shadow:0 22px 40px rgba(0,0,0,.5),0 0 0 1px rgba(183,130,58,.25),0 0 34px rgba(183,130,58,.18);animation:flutuar 3.2s ease-in-out infinite}
    .marca img{width:88px;height:88px;object-fit:contain;filter:drop-shadow(0 4px 10px rgba(0,0,0,.35))}

    .mini{color:var(--acento2);font-size:11px;font-weight:700;letter-spacing:.34em;text-transform:uppercase;margin-bottom:10px}
    .titulo{margin:0;font-family:Georgia,'Times New Roman',serif;font-size:clamp(26px,7vw,34px);line-height:1.15;font-weight:600;letter-spacing:.01em;text-shadow:0 10px 24px rgba(0,0,0,.4)}
    .titulo span{color:var(--acento2)}
    .sub{margin:12px 0 26px;color:var(--muted);font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;line-height:1.6}

    .barra{width:min(74vw,280px);height:7px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(183,130,58,.28);box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
    .barra span{display:block;width:38%;height:100%;border-radius:inherit;background:linear-gradient(90deg,transparent,var(--acento),var(--acento2),#efe0c4,transparent);box-shadow:0 0 14px rgba(183,130,58,.85);animation:carregar 1.4s ease-in-out infinite}

    .status{min-height:20px;margin-top:14px;color:#cfd6da;font-size:12px;letter-spacing:.06em}
    .status::after{content:"";animation:pontos 1.25s steps(4,end) infinite}

    #fallback{display:none;width:min(86vw,340px);margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)}
    #fallback p{margin:0 0 13px;color:var(--muted);font-size:13px;line-height:1.5}
    #abrirDireto{
      display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:12px 24px;border-radius:12px;
      background:linear-gradient(135deg,var(--acento2),var(--acento));color:#231703;font-size:14px;font-weight:700;text-decoration:none;
      box-shadow:0 10px 26px rgba(183,130,58,.25);
    }

    @keyframes entrada{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
    @keyframes flutuar{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes girar{to{transform:rotate(360deg)}}
    @keyframes pulsar{0%,100%{transform:scale(.94);opacity:.6}50%{transform:scale(1.08);opacity:1}}
    @keyframes carregar{0%{transform:translateX(-135%)}100%{transform:translateX(375%)}}
    @keyframes pontos{0%{content:""}25%{content:"."}50%{content:".."}75%,100%{content:"..."}}

    @media(max-height:680px){
      .universo{width:170px;height:170px;margin-bottom:14px}
      .marca{width:108px;height:108px;border-radius:24px}
      .marca img{width:70px;height:70px}
      .titulo{font-size:26px}
      .sub{margin:9px 0 18px}
    }
  </style>
</head>
<body>
  <div id="splash" aria-live="polite">
    <div class="conteudo">
      <div class="universo">
        <div class="halo"></div>
        <div class="anel a"></div>
        <div class="anel b"></div>
        <div class="marca"><img src="./icone.png" alt="Rayssa Zaine"></div>
      </div>
      <div class="mini">Espaço de Bem-Estar</div>
      <h1 class="titulo">RAYSSA <span>ZAINE</span></h1>
      <div class="sub">Massoterapia &amp; Estética Corporal</div>
      <div class="barra"><span></span></div>
      <div class="status" id="status">Carregando sistema</div>
      <div id="fallback">
        <p>O sistema está demorando mais que o esperado para abrir.</p>
        <a id="abrirDireto"
           href="https://script.google.com/macros/s/AKfycbzpSNcxGfD6cSutik1lQ6fW_D8gRlA-jhoFLVSOGpx0Rsfb7Ksq2CPJVMZ2vbXLJG4h/exec"
           target="_self" rel="noopener">ABRIR SISTEMA</a>
      </div>
    </div>
  </div>

  <iframe id="app" title="Sistema Rayssa Zaine Massoterapia"
    src="https://script.google.com/macros/s/AKfycbzpSNcxGfD6cSutik1lQ6fW_D8gRlA-jhoFLVSOGpx0Rsfb7Ksq2CPJVMZ2vbXLJG4h/exec"
    allow="clipboard-read; clipboard-write"></iframe>

  <script>
    const splash = document.getElementById('splash');
    const iframe = document.getElementById('app');
    const fallback = document.getElementById('fallback');
    const status = document.getElementById('status');

    const inicio = Date.now();
    const TEMPO_MINIMO_SPLASH = 2600;
    const TEMPO_LIMITE = 15000;

    let iframeCarregado = false;
    let splashEncerrada = false;

    function encerrarSplash(){
      if(splashEncerrada) return;
      const decorrido = Date.now() - inicio;
      const restante = Math.max(0, TEMPO_MINIMO_SPLASH - decorrido);
      window.setTimeout(function(){
        splashEncerrada = true;
        status.textContent = 'Sistema pronto';
        iframe.classList.add('visivel');
        splash.classList.add('saindo');
        window.setTimeout(function(){ splash.style.display = 'none'; }, 800);
      }, restante);
    }

    iframe.addEventListener('load', function(){
      iframeCarregado = true;
      encerrarSplash();
    });

    window.setTimeout(function(){
      if(iframeCarregado || splashEncerrada) return;
      status.textContent = 'Ainda carregando';
      fallback.style.display = 'block';
    }, TEMPO_LIMITE);
  </script>
</body>
</html>
