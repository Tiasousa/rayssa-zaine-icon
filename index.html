<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Rayssa Zaine Massoterapia</title>

  <!-- PWA / Adicionar à Tela de Início -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F5F5F4">

  <!-- iOS: ícone e modo tela cheia ao abrir pela tela inicial -->
  <link rel="apple-touch-icon" href="icone.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RZ Massoterapia">

  <style>
    html,body{height:100%;margin:0;background:#F5F5F4;display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,system-ui,sans-serif}
    .wrap{text-align:center;color:#6b6b6b}
    img{width:110px;height:110px;border-radius:24px;margin-bottom:18px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
    .spin{width:28px;height:28px;border-radius:50%;border:3px solid rgba(0,0,0,.08);
      border-top-color:#B7823A;animation:sp .8s linear infinite;margin:14px auto 0}
    @keyframes sp{to{transform:rotate(360deg)}}
    p{font-size:14px;margin-top:14px}
  </style>

  <!-- Registra o service worker (necessário para o Chrome oferecer "Instalar app") -->
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  </script>

  <!-- Redireciona automaticamente para o sistema -->
  <script>
    setTimeout(function(){
      window.location.replace('https://script.google.com/macros/s/AKfycbzpSNcxGfD6cSutik1lQ6fW_D8gRlA-jhoFLVSOGpx0Rsfb7Ksq2CPJVMZ2vbXLJG4h/exec');
    }, 350);
  </script>
</head>
<body>
  <div class="wrap">
    <img src="icone.png" alt="Rayssa Zaine Massoterapia">
    <div class="spin"></div>
    <p>Abrindo o sistema...</p>
  </div>
</body>
</html>
